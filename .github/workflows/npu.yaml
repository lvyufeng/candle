name: NPU

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths:
      - 'src/candle/**'
      - 'tests/**'
      - '.github/workflows/**'
  push:
    branches: ["main"]
    paths:
      - 'src/candle/**'
      - 'tests/**'
      - '.github/workflows/**'

permissions:
  contents: read

env:
  CONDA_EXE: /home/lvyufeng/miniconda3/bin/conda
  CONDA_ENV_PREFIX: /tmp/candle-npu-ci
  ASCEND_ENV_SCRIPT: /usr/local/Ascend/ascend-toolkit/set_env.sh
  ASCEND_REQUIRED_GROUP: HwHiAiUser
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
  PYTHONNOUSERSITE: '1'

jobs:
  test-npu:
    name: NPU Suite (6-7)
    runs-on: [self-hosted, linux, ascend, 910a, npu-6-7]
    timeout-minutes: 90
    env:
      ASCEND_RT_VISIBLE_DEVICES: 6,7
      ASCEND_VISIBLE_DEVICES: 6,7
      JOB_CONDA_ENV: /tmp/candle-npu-ci-6-7
    steps:
    - uses: actions/checkout@v4
    - name: Prepare conda environment
      run: |
        "$CONDA_EXE" create -y -p "$JOB_CONDA_ENV" python=3.11 pip
    - name: Show Python environment
      run: |
        "$JOB_CONDA_ENV/bin/python" --version
        "$JOB_CONDA_ENV/bin/python" -m pip --version
    - name: Install dependencies
      run: |
        "$JOB_CONDA_ENV/bin/python" -m pip install --upgrade pip
        "$JOB_CONDA_ENV/bin/python" -m pip install -r requirements/requirements-test.txt
    - name: Install candle
      run: |
        "$JOB_CONDA_ENV/bin/python" -m pip install -e .
    - name: Show runner NPU mapping
      run: |
        source "$ASCEND_ENV_SCRIPT"
        # Run test-facing commands in a minimal env so runner-local Python state does not leak into pytest.
        clean_env() {
          local cmd
          printf -v cmd '%q ' \
          env -i \
            HOME="$HOME" \
            PATH="$JOB_CONDA_ENV/bin:${ASCEND_TOOLKIT_HOME}/bin:${ASCEND_TOOLKIT_HOME}/compiler/ccec_compiler/bin:${ASCEND_TOOLKIT_HOME}/tools/ccec_compiler/bin:/usr/bin:/bin" \
            LANG="${LANG:-C.UTF-8}" \
            LD_LIBRARY_PATH="$LD_LIBRARY_PATH" \
            PYTHONPATH="${PYTHONPATH:-}" \
            ASCEND_TOOLKIT_HOME="$ASCEND_TOOLKIT_HOME" \
            ASCEND_AICPU_PATH="$ASCEND_AICPU_PATH" \
            ASCEND_OPP_PATH="$ASCEND_OPP_PATH" \
            TOOLCHAIN_HOME="$TOOLCHAIN_HOME" \
            ASCEND_HOME_PATH="$ASCEND_HOME_PATH" \
            ASCEND_RT_VISIBLE_DEVICES="$ASCEND_RT_VISIBLE_DEVICES" \
            ASCEND_VISIBLE_DEVICES="$ASCEND_VISIBLE_DEVICES" \
            PYTEST_DISABLE_PLUGIN_AUTOLOAD="$PYTEST_DISABLE_PLUGIN_AUTOLOAD" \
            PYTHONNOUSERSITE="$PYTHONNOUSERSITE" \
            "$@"
          /usr/bin/sg "$ASCEND_REQUIRED_GROUP" -c "$cmd"
        }
        clean_env python -c "import os, sys, candle as torch; print('Python executable:', sys.executable); print('Process groups:', os.getgroups()); print('ASCEND_RT_VISIBLE_DEVICES=', os.environ.get('ASCEND_RT_VISIBLE_DEVICES')); print('ASCEND_VISIBLE_DEVICES=', os.environ.get('ASCEND_VISIBLE_DEVICES')); print('NPU available:', torch.npu.is_available()); print('NPU device count:', torch.npu.device_count())"
    - name: Assert NPU availability
      run: |
        source "$ASCEND_ENV_SCRIPT"
        clean_env() {
          local cmd
          printf -v cmd '%q ' \
          env -i \
            HOME="$HOME" \
            PATH="$JOB_CONDA_ENV/bin:${ASCEND_TOOLKIT_HOME}/bin:${ASCEND_TOOLKIT_HOME}/compiler/ccec_compiler/bin:${ASCEND_TOOLKIT_HOME}/tools/ccec_compiler/bin:/usr/bin:/bin" \
            LANG="${LANG:-C.UTF-8}" \
            LD_LIBRARY_PATH="$LD_LIBRARY_PATH" \
            PYTHONPATH="${PYTHONPATH:-}" \
            ASCEND_TOOLKIT_HOME="$ASCEND_TOOLKIT_HOME" \
            ASCEND_AICPU_PATH="$ASCEND_AICPU_PATH" \
            ASCEND_OPP_PATH="$ASCEND_OPP_PATH" \
            TOOLCHAIN_HOME="$TOOLCHAIN_HOME" \
            ASCEND_HOME_PATH="$ASCEND_HOME_PATH" \
            ASCEND_RT_VISIBLE_DEVICES="$ASCEND_RT_VISIBLE_DEVICES" \
            ASCEND_VISIBLE_DEVICES="$ASCEND_VISIBLE_DEVICES" \
            PYTEST_DISABLE_PLUGIN_AUTOLOAD="$PYTEST_DISABLE_PLUGIN_AUTOLOAD" \
            PYTHONNOUSERSITE="$PYTHONNOUSERSITE" \
            "$@"
          /usr/bin/sg "$ASCEND_REQUIRED_GROUP" -c "$cmd"
        }
        clean_env python -c "import candle as torch; count = torch.npu.device_count(); assert torch.npu.is_available(), 'expected NPU to be available in NPU Suite (6-7)'; assert count >= 2, f'expected >=2 visible NPUs, found {count}'"
    - name: Run NPU tests
      run: |
        source "$ASCEND_ENV_SCRIPT"
        clean_env() {
          local cmd
          printf -v cmd '%q ' \
          env -i \
            HOME="$HOME" \
            PATH="$JOB_CONDA_ENV/bin:${ASCEND_TOOLKIT_HOME}/bin:${ASCEND_TOOLKIT_HOME}/compiler/ccec_compiler/bin:${ASCEND_TOOLKIT_HOME}/tools/ccec_compiler/bin:/usr/bin:/bin" \
            LANG="${LANG:-C.UTF-8}" \
            LD_LIBRARY_PATH="$LD_LIBRARY_PATH" \
            PYTHONPATH="${PYTHONPATH:-}" \
            ASCEND_TOOLKIT_HOME="$ASCEND_TOOLKIT_HOME" \
            ASCEND_AICPU_PATH="$ASCEND_AICPU_PATH" \
            ASCEND_OPP_PATH="$ASCEND_OPP_PATH" \
            TOOLCHAIN_HOME="$TOOLCHAIN_HOME" \
            ASCEND_HOME_PATH="$ASCEND_HOME_PATH" \
            ASCEND_RT_VISIBLE_DEVICES="$ASCEND_RT_VISIBLE_DEVICES" \
            ASCEND_VISIBLE_DEVICES="$ASCEND_VISIBLE_DEVICES" \
            PYTEST_DISABLE_PLUGIN_AUTOLOAD="$PYTEST_DISABLE_PLUGIN_AUTOLOAD" \
            PYTHONNOUSERSITE="$PYTHONNOUSERSITE" \
            "$@"
          /usr/bin/sg "$ASCEND_REQUIRED_GROUP" -c "$cmd"
        }
        clean_env pytest tests/npu/ -v --tb=short \
          --ignore=tests/npu/test_pipeline_npu_bench_smoke.py \
          --ignore=tests/npu/910b/ \
          --ignore=tests/npu/310b/ \
          --ignore=tests/npu/310p/

