            ASCEND_HOME_PATH="$ASCEND_HOME_PATH" \
            ASCEND_RT_VISIBLE_DEVICES="$ASCEND_RT_VISIBLE_DEVICES" \
            ASCEND_VISIBLE_DEVICES="$ASCEND_VISIBLE_DEVICES" \
            PYTEST_DISABLE_PLUGIN_AUTOLOAD="$PYTEST_DISABLE_PLUGIN_AUTOLOAD" \
            PYTHONNOUSERSITE="$PYTHONNOUSERSITE" \
            "$@"
          /usr/bin/sg "$ASCEND_REQUIRED_GROUP" -c "$cmd"
        }
        clean_env pytest tests/distributed/ -v --tb=short -k "not all_to_all_single_async_unequal_multicard and not all_to_all_single_invalid_split_pairing_multicard and not all_to_all_single_split_numel_validation_multicard and not test_ddp"
    - name: Run 2-card HCCL all_to_all coverage
      run: |
        set -o pipefail
        source "$ASCEND_ENV_SCRIPT"
        clean_env() {
          local cmd
          printf -v cmd '%q ' \
          env -i \
            HOME="$HOME" \
            PATH="$JOB_CONDA_ENV/bin:${ASCEND_TOOLKIT_HOME}/bin:${ASCEND_TOOLKIT_HOME}/compiler/ccec_compiler/bin:${ASCEND_TOOLKIT_HOME}/tools/ccec_compiler/bin:/usr/bin:/bin" \
            LANG="${LANG:-C.UTF-8}" \
            LD_LIBRARY_PATH="$LD_LIBRARY_PATH" \
            PYTHONPATH="${PYTHONPATH:-}" \
            ASCEND_TOOLKIT_HOME="$ASCEND_TOOLKIT_HOME" \
            ASCEND_AICPU_PATH="$ASCEND_AICPU_PATH" \
            ASCEND_OPP_PATH="$ASCEND_OPP_PATH" \
            TOOLCHAIN_HOME="$TOOLCHAIN_HOME" \
            ASCEND_HOME_PATH="$ASCEND_HOME_PATH" \
            ASCEND_RT_VISIBLE_DEVICES="$ASCEND_RT_VISIBLE_DEVICES" \
            ASCEND_VISIBLE_DEVICES="$ASCEND_VISIBLE_DEVICES" \
            PYTEST_DISABLE_PLUGIN_AUTOLOAD="$PYTEST_DISABLE_PLUGIN_AUTOLOAD" \
            PYTHONNOUSERSITE="$PYTHONNOUSERSITE" \
            "$@"
          /usr/bin/sg "$ASCEND_REQUIRED_GROUP" -c "$cmd"
        }
        clean_env pytest \
          'tests/distributed/test_hccl_all_to_all_single_async_unequal_multicard.py::test_hccl_all_to_all_single_async_unequal_multicard[2-29714]' \
          'tests/distributed/test_hccl_all_to_all_single_invalid_splits_multicard.py::test_hccl_all_to_all_single_invalid_split_pairing_multicard[2-29715]' \
          'tests/distributed/test_hccl_all_to_all_single_split_numel_validation_multicard.py::test_hccl_all_to_all_single_split_numel_validation_multicard[input_sum_mismatch-2-29716]' \
          'tests/distributed/test_hccl_all_to_all_single_split_numel_validation_multicard.py::test_hccl_all_to_all_single_split_numel_validation_multicard[output_sum_mismatch-2-29716]' \
          -v -rs --tb=short | tee /tmp/candle-hccl-2card.log
        if grep -nE "SKIPPED|skipped" /tmp/candle-hccl-2card.log; then
          echo "2-card HCCL coverage unexpectedly skipped tests" >&2
          exit 1
        fi

