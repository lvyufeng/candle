name: CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - 'src/candle/**'
      - 'tests/**'
      - '.github/workflows/**'
  push:
    branches: ["main"]
    paths:
      - 'src/candle/**'
      - 'tests/**'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  pylint-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/requirements-lint.txt
    - name: Lint with pylint
      run: |
        pylint --jobs=1 src/candle --rcfile=.github/pylint.conf

  test-cpu:
    needs: pylint-check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/requirements-test.txt
    - name: Install candle
      run: |
        pip install -e .
    - name: Run CPU tests
      run: |
        pytest tests/cpu/ tests/contract/ -v --tb=short

  test-mps:
    needs: pylint-check
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/requirements-test-mps.txt
    - name: Install candle
      run: |
        pip install -e .
    - name: Verify MPS availability
      run: |
        python -c "from candle._backends.mps.runtime import is_available; print('MPS available:', is_available())"
    - name: Run MPS tests
      run: |
        pytest tests/mps/ -v --tb=short

