name: CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - 'src/candle/**'
      - 'tests/**'
      - '.github/workflows/**'
  push:
    branches: ["main"]
    paths:
      - 'src/candle/**'
      - 'tests/**'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  pylint-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/requirements-lint.txt
    - name: Lint with pylint
      run: |
        pylint --jobs=1 src/candle --rcfile=.github/pylint.conf

  test-cpu:
    needs: pylint-check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/requirements-test.txt
    - name: Install candle
      run: |
        pip install -e .
    - name: Run CPU tests
      run: |
        pytest tests/cpu/ tests/contract/ -v --tb=short

  test-mps:
    needs: pylint-check
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/requirements-test-mps.txt
    - name: Install candle
      run: |
        pip install -e .
    - name: Verify MPS availability
      run: |
        python -c "from candle._backends.mps.runtime import is_available; print('MPS available:', is_available())"
    - name: Run MPS tests
      run: |
        pytest tests/mps/ -v --tb=short

  # ── NPU 910B runners (ascendnode3, 8× Ascend 910B3) ──────────────
  # Card allocation: unit [0,1] | integ [2,3] | dist [4,5,6,7]

  test-npu-910b-unit:
    needs: pylint-check
    runs-on: [self-hosted, npu-unit]
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - name: Install candle
      run: |
        source /opt/miniconda3/etc/profile.d/conda.sh
        conda activate candle
        pip install -e .
    - name: Run NPU common + 910B op tests
      run: |
        source /opt/miniconda3/etc/profile.d/conda.sh
        conda activate candle
        pytest tests/npu/common/ tests/npu/910b/ -v --tb=short

  test-npu-910b-integ:
    needs: pylint-check
    runs-on: [self-hosted, npu-integ]
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - name: Install candle
      run: |
        source /opt/miniconda3/etc/profile.d/conda.sh
        conda activate candle
        pip install -e .
    - name: Run NPU integration tests
      run: |
        source /opt/miniconda3/etc/profile.d/conda.sh
        conda activate candle
        pytest tests/npu/ -v --tb=short \
          --ignore=tests/npu/common \
          --ignore=tests/npu/910a \
          --ignore=tests/npu/910b \
          --ignore=tests/npu/310b \
          --ignore=tests/npu/310p

  test-npu-910b-dist:
    needs: [test-npu-910b-unit, test-npu-910b-integ]
    runs-on: [self-hosted, npu-dist]
    timeout-minutes: 45
    steps:
    - uses: actions/checkout@v4
    - name: Install candle
      run: |
        source /opt/miniconda3/etc/profile.d/conda.sh
        conda activate candle
        pip install -e .
    - name: Run HCCL distributed tests
      run: |
        source /opt/miniconda3/etc/profile.d/conda.sh
        conda activate candle
        pytest tests/distributed/ -v --tb=short -k "hccl"

