name: OpenI 910A (PR)

env:
  OPENI_SUITE_TASK_ID: ${{ vars.OPENI_SUITE_TASK_ID }}
  OPENI_DIST4_TASK_ID: ${{ vars.OPENI_DIST4_TASK_ID }}
  OPENI_IMAGE_ID: ${{ vars.OPENI_IMAGE_ID }}
  OPENI_IMAGE_NAME: ${{ vars.OPENI_IMAGE_NAME }}

on:
  pull_request_target:
    branches: [main]
    paths:
      - 'src/candle/**'
      - 'tests/npu/**'
      - 'setup.py'
      - 'pyproject.toml'
      - 'MANIFEST.in'
      - 'requirements/**'
      - '.github/workflows/ci.yaml'
      - '.github/scripts/**'
      - 'tests/conftest.py'

permissions:
  contents: read
  actions: write

concurrency:
  group: openi-910a-npu
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  suite-start:
    name: Suite - Start
    runs-on: ubuntu-latest
    environment: openi-npu
    timeout-minutes: 30
    env:
      OPENI_ARTIFACT_SUFFIX: suite
    outputs:
      runner-label: ${{ steps.start-runner.outputs.runner-label }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install orchestrator deps
        run: pip install requests websocket-client
      - name: Ensure OpenI suite task
        env:
          OPENI_USER_NAME: ${{ secrets.OPENI_USER_NAME }}
          OPENI_USER_PASSWORD: ${{ secrets.OPENI_USER_PASSWORD }}
        run: |
          python .github/scripts/openi_ci.py ensure-task \
            --task-id "$OPENI_SUITE_TASK_ID" \
            --spec-id "328" \
            --cluster "C2Net" \
            --compute-source "NPU" \
            --image-id "$OPENI_IMAGE_ID" \
            --image-name "$OPENI_IMAGE_NAME"
      - name: Wait for task
        env:
          OPENI_USER_NAME: ${{ secrets.OPENI_USER_NAME }}
          OPENI_USER_PASSWORD: ${{ secrets.OPENI_USER_PASSWORD }}
        run: python .github/scripts/openi_ci.py wait-task
      - name: Start self-hosted runner
        id: start-runner
        env:
          OPENI_USER_NAME: ${{ secrets.OPENI_USER_NAME }}
          OPENI_USER_PASSWORD: ${{ secrets.OPENI_USER_PASSWORD }}
          OPENI_RUNNER_TOKEN: ${{ secrets.OPENI_RUNNER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABEL="openi-suite-${{ github.run_id }}"
          python .github/scripts/openi_ci.py start-runner \
            --label "$LABEL" \
            --repo "${{ github.repository }}"
          echo "runner-label=[\"self-hosted\",\"openi-npu\",\"$LABEL\"]" >> "$GITHUB_OUTPUT"
      - name: Wait for runner online
        env:
          OPENI_RUNNER_TOKEN: ${{ secrets.OPENI_RUNNER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/openi_ci.py wait-runner \
            --label "openi-suite-${{ github.run_id }}" \
            --repo "${{ github.repository }}" \
            --timeout 300

  suite-run:
    name: Suite - Run (1-card)
    needs: suite-start
    runs-on: ${{ fromJson(needs.suite-start.outputs.runner-label) }}
    timeout-minutes: 60
    env:
      http_proxy: ""
      https_proxy: ""
      ftp_proxy: ""
      no_proxy: ""
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      FTP_PROXY: ""
      NO_PROXY: ""
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: Inspect runner proxy state
        run: |
          echo '=== env proxy vars ==='
          env | sort | grep -i proxy || echo '(none)'
          echo '=== git global proxy config ==='
          git config --global --get-regexp 'http\..*proxy' || echo '(none)'
          echo '=== git system proxy config ==='
          git config --system --get-regexp 'http\..*proxy' 2>/dev/null || echo '(none)'
          echo '=== /home/ma-user/.gitconfig ==='
          cat /home/ma-user/.gitconfig 2>/dev/null || echo '(no file)'
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Build candle
        run: |
          source /home/ma-user/anaconda3/etc/profile.d/conda.sh
          conda activate /home/ma-user/work/.conda/envs/candle-py311
          pip install -i https://pypi.tuna.tsinghua.edu.cn/simple Cython
          python setup.py build_ext --inplace
          pip install -i https://pypi.tuna.tsinghua.edu.cn/simple -e . --no-build-isolation
      - name: Run suite tests
        run: |
          source /home/ma-user/anaconda3/etc/profile.d/conda.sh
          conda activate /home/ma-user/work/.conda/envs/candle-py311
          export ASCEND_RT_VISIBLE_DEVICES=0
          export ASCEND_VISIBLE_DEVICES=0
          export PYTEST_DISABLE_PLUGIN_AUTOLOAD=1
          python -m pytest tests/npu/ -v --tb=short \
            --ignore=tests/npu/test_pipeline_npu_bench_smoke.py \
            --ignore=tests/npu/910b/ \
            --ignore=tests/npu/310b/ \
            --ignore=tests/npu/310p/ \
            --junitxml junit.xml 2>&1 | tee pytest.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: openi-910a-suite-results
          path: |
            pytest.log
            junit.xml
          retention-days: 7

  suite-stop:
    name: Suite - Stop
    needs: [suite-start, suite-run]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests websocket-client
      - name: Stop suite task
        env:
          OPENI_USER_NAME: ${{ secrets.OPENI_USER_NAME }}
          OPENI_USER_PASSWORD: ${{ secrets.OPENI_USER_PASSWORD }}
        run: |
          python .github/scripts/openi_ci.py cleanup-task \
            --task-id "$OPENI_SUITE_TASK_ID" \
            --spec-id "328" \
            --cluster "C2Net" \
            --compute-source "NPU" \
            --image-id "$OPENI_IMAGE_ID" \
            --image-name "$OPENI_IMAGE_NAME"

  dist4-start:
    name: Dist 4-card - Start
    needs: suite-stop
    runs-on: ubuntu-latest
    environment: openi-npu
    timeout-minutes: 30
    env:
      OPENI_ARTIFACT_SUFFIX: dist-4card
    outputs:
      runner-label: ${{ steps.start-runner.outputs.runner-label }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install orchestrator deps
        run: pip install requests websocket-client
      - name: Ensure OpenI dist-4card task
        env:
          OPENI_USER_NAME: ${{ secrets.OPENI_USER_NAME }}
          OPENI_USER_PASSWORD: ${{ secrets.OPENI_USER_PASSWORD }}
        run: |
          python .github/scripts/openi_ci.py ensure-task \
            --task-id "$OPENI_DIST4_TASK_ID" \
            --spec-id "340" \
            --cluster "C2Net" \
            --compute-source "NPU" \
            --image-id "$OPENI_IMAGE_ID" \
            --image-name "$OPENI_IMAGE_NAME"
      - name: Wait for task
        env:
          OPENI_USER_NAME: ${{ secrets.OPENI_USER_NAME }}
          OPENI_USER_PASSWORD: ${{ secrets.OPENI_USER_PASSWORD }}
        run: python .github/scripts/openi_ci.py wait-task
      - name: Start self-hosted runner
        id: start-runner
        env:
          OPENI_USER_NAME: ${{ secrets.OPENI_USER_NAME }}
          OPENI_USER_PASSWORD: ${{ secrets.OPENI_USER_PASSWORD }}
          OPENI_RUNNER_TOKEN: ${{ secrets.OPENI_RUNNER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABEL="openi-dist4-${{ github.run_id }}"
          python .github/scripts/openi_ci.py start-runner \
            --label "$LABEL" \
            --repo "${{ github.repository }}"
          echo "runner-label=[\"self-hosted\",\"openi-npu\",\"$LABEL\"]" >> "$GITHUB_OUTPUT"
      - name: Wait for runner online
        env:
          OPENI_RUNNER_TOKEN: ${{ secrets.OPENI_RUNNER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/openi_ci.py wait-runner \
            --label "openi-dist4-${{ github.run_id }}" \
            --repo "${{ github.repository }}" \
            --timeout 300

  dist4-run:
    name: Dist 4-card - Run
    needs: dist4-start
    runs-on: ${{ fromJson(needs.dist4-start.outputs.runner-label) }}
    timeout-minutes: 90
    env:
      http_proxy: ""
      https_proxy: ""
      ftp_proxy: ""
      no_proxy: ""
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      FTP_PROXY: ""
      NO_PROXY: ""
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: Inspect runner proxy state
        run: |
          echo '=== env proxy vars ==='
          env | sort | grep -i proxy || echo '(none)'
          echo '=== git global proxy config ==='
          git config --global --get-regexp 'http\..*proxy' || echo '(none)'
          echo '=== git system proxy config ==='
          git config --system --get-regexp 'http\..*proxy' 2>/dev/null || echo '(none)'
          echo '=== /home/ma-user/.gitconfig ==='
          cat /home/ma-user/.gitconfig 2>/dev/null || echo '(no file)'
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Build candle
        run: |
          source /home/ma-user/anaconda3/etc/profile.d/conda.sh
          conda activate /home/ma-user/work/.conda/envs/candle-py311
          pip install -i https://pypi.tuna.tsinghua.edu.cn/simple Cython
          python setup.py build_ext --inplace
          pip install -i https://pypi.tuna.tsinghua.edu.cn/simple -e . --no-build-isolation
      - name: Run distributed tests
        run: |
          source /home/ma-user/anaconda3/etc/profile.d/conda.sh
          conda activate /home/ma-user/work/.conda/envs/candle-py311
          export ASCEND_RT_VISIBLE_DEVICES=0,1,2,3
          export ASCEND_VISIBLE_DEVICES=0,1,2,3
          export PYTEST_DISABLE_PLUGIN_AUTOLOAD=1
          python -m pytest tests/distributed/ -v --tb=short \
            -k 'not test_ddp' 2>&1 | tee dist.log
      - name: Run 4-card HCCL tests
        run: |
          source /home/ma-user/anaconda3/etc/profile.d/conda.sh
          conda activate /home/ma-user/work/.conda/envs/candle-py311
          export ASCEND_RT_VISIBLE_DEVICES=0,1,2,3
          export ASCEND_VISIBLE_DEVICES=0,1,2,3
          export PYTEST_DISABLE_PLUGIN_AUTOLOAD=1
          python -m pytest \
            'tests/distributed/test_hccl_all_to_all_single_async_unequal_multicard.py::test_hccl_all_to_all_single_async_unequal_multicard[4-29724]' \
            'tests/distributed/test_hccl_all_to_all_single_invalid_splits_multicard.py::test_hccl_all_to_all_single_invalid_split_pairing_multicard[4-29725]' \
            'tests/distributed/test_hccl_all_to_all_single_split_numel_validation_multicard.py::test_hccl_all_to_all_single_split_numel_validation_multicard[input_sum_mismatch-4-29726]' \
            'tests/distributed/test_hccl_all_to_all_single_split_numel_validation_multicard.py::test_hccl_all_to_all_single_split_numel_validation_multicard[output_sum_mismatch-4-29726]' \
            -v -rs --tb=short 2>&1 | tee hccl.log
          if grep -q 'SKIPPED' hccl.log; then
            echo 'ERROR: SKIPPED tests found in HCCL log' >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: openi-910a-dist4-results
          path: |
            dist.log
            hccl.log
          retention-days: 7

  dist4-stop:
    name: Dist 4-card - Stop
    needs: [dist4-start, dist4-run]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests websocket-client
      - name: Stop dist-4card task
        env:
          OPENI_USER_NAME: ${{ secrets.OPENI_USER_NAME }}
          OPENI_USER_PASSWORD: ${{ secrets.OPENI_USER_PASSWORD }}
        run: |
          python .github/scripts/openi_ci.py cleanup-task \
            --task-id "$OPENI_DIST4_TASK_ID" \
            --spec-id "340" \
            --cluster "C2Net" \
            --compute-source "NPU" \
            --image-id "$OPENI_IMAGE_ID" \
            --image-name "$OPENI_IMAGE_NAME"
