# ===== Batch 1: Unary ops =====

- name: log1p(Tensor self) -> Tensor
  self: "redispatch(\"div\", keyset, grad, redispatch(\"add\", keyset, _scalar_tensor_like(self, 1.0), self))"

- name: expm1(Tensor self) -> Tensor
  self: redispatch("mul", keyset, grad, redispatch("exp", keyset, self))

- name: reciprocal(Tensor self) -> Tensor
  self: "redispatch(\"div\", keyset, redispatch(\"neg\", keyset, grad), redispatch(\"mul\", keyset, self, self))"

- name: softsign(Tensor self) -> Tensor
  self: "_softsign_grad(grad, self, keyset)"

- name: tan(Tensor self) -> Tensor
  self: "redispatch(\"div\", keyset, grad, redispatch(\"mul\", keyset, redispatch(\"cos\", keyset, self), redispatch(\"cos\", keyset, self)))"

- name: asin(Tensor self) -> Tensor
  self: "redispatch(\"div\", keyset, grad, redispatch(\"sqrt\", keyset, redispatch(\"add\", keyset, _scalar_tensor_like(self, 1.0), redispatch(\"neg\", keyset, redispatch(\"mul\", keyset, self, self)))))"

- name: acos(Tensor self) -> Tensor
  self: "redispatch(\"div\", keyset, redispatch(\"neg\", keyset, grad), redispatch(\"sqrt\", keyset, redispatch(\"add\", keyset, _scalar_tensor_like(self, 1.0), redispatch(\"neg\", keyset, redispatch(\"mul\", keyset, self, self)))))"

- name: atan(Tensor self) -> Tensor
  self: "redispatch(\"div\", keyset, grad, redispatch(\"add\", keyset, _scalar_tensor_like(self, 1.0), redispatch(\"mul\", keyset, self, self)))"

- name: sinh(Tensor self) -> Tensor
  self: redispatch("mul", keyset, grad, redispatch("cosh", keyset, self))

- name: cosh(Tensor self) -> Tensor
  self: redispatch("mul", keyset, grad, redispatch("sinh", keyset, self))

- name: asinh(Tensor self) -> Tensor
  self: "redispatch(\"div\", keyset, grad, redispatch(\"sqrt\", keyset, redispatch(\"add\", keyset, redispatch(\"mul\", keyset, self, self), _scalar_tensor_like(self, 1.0))))"

- name: acosh(Tensor self) -> Tensor
  self: "redispatch(\"div\", keyset, grad, redispatch(\"sqrt\", keyset, redispatch(\"add\", keyset, redispatch(\"mul\", keyset, self, self), redispatch(\"neg\", keyset, _scalar_tensor_like(self, 1.0)))))"

- name: atanh(Tensor self) -> Tensor
  self: "redispatch(\"div\", keyset, grad, redispatch(\"add\", keyset, _scalar_tensor_like(self, 1.0), redispatch(\"neg\", keyset, redispatch(\"mul\", keyset, self, self))))"

- name: log10(Tensor self) -> Tensor
  self: "redispatch(\"div\", keyset, grad, redispatch(\"mul\", keyset, self, _scalar_tensor_like(self, __import__('math').log(10.0))))"

- name: erfc(Tensor self) -> Tensor
  self: "redispatch(\"mul\", keyset, grad, redispatch(\"mul\", keyset, _scalar_tensor_like(self, -2.0 / __import__('math').sqrt(__import__('math').pi)), redispatch(\"exp\", keyset, redispatch(\"neg\", keyset, redispatch(\"mul\", keyset, self, self)))))"

- name: log2(Tensor self) -> Tensor
  self: "redispatch(\"div\", keyset, grad, redispatch(\"mul\", keyset, self, _scalar_tensor_like(self, __import__('math').log(2.0))))"

- name: exp2(Tensor self) -> Tensor
  self: "redispatch(\"mul\", keyset, grad, redispatch(\"mul\", keyset, redispatch(\"exp2\", keyset, self), _scalar_tensor_like(self, __import__('math').log(2.0))))"

- name: square(Tensor self) -> Tensor
  self: "redispatch(\"mul\", keyset, grad, redispatch(\"mul\", keyset, _scalar_tensor_like(self, 2.0), self))"

- name: frac(Tensor self) -> Tensor
  self: grad

- name: ceil(Tensor self) -> Tensor
  self: "redispatch(\"mul\", keyset, grad, _scalar_tensor_like(self, 0.0))"

- name: floor(Tensor self) -> Tensor
  self: "redispatch(\"mul\", keyset, grad, _scalar_tensor_like(self, 0.0))"

- name: round(Tensor self) -> Tensor
  self: "redispatch(\"mul\", keyset, grad, _scalar_tensor_like(self, 0.0))"

- name: trunc(Tensor self) -> Tensor
  self: "redispatch(\"mul\", keyset, grad, _scalar_tensor_like(self, 0.0))"

- name: sign(Tensor self) -> Tensor
  self: "redispatch(\"mul\", keyset, grad, _scalar_tensor_like(self, 0.0))"

- name: signbit(Tensor self) -> Tensor
  self: "redispatch(\"mul\", keyset, grad, _scalar_tensor_like(self, 0.0))"

# ===== Batch 2: Binary ops =====

- name: sub.Tensor(Tensor self, Tensor other) -> Tensor
  self: reduce_grad(grad, self.shape)
  other: reduce_grad(redispatch("neg", keyset, grad), other.shape)

- name: true_divide(Tensor self, Tensor other) -> Tensor
  self, other: "_div_backward_all(grad, self, other, keyset)"

- name: mm(Tensor self, Tensor other) -> Tensor
  self: "redispatch(\"mm\", keyset, grad, redispatch(\"transpose\", keyset, other, 0, 1))"
  other: "redispatch(\"mm\", keyset, redispatch(\"transpose\", keyset, self, 0, 1), grad)"

- name: bmm(Tensor self, Tensor other) -> Tensor
  self: "redispatch(\"matmul\", keyset, grad, redispatch(\"transpose\", keyset, other, -1, -2))"
  other: "redispatch(\"matmul\", keyset, redispatch(\"transpose\", keyset, self, -1, -2), grad)"

- name: pow(Tensor self, Tensor other) -> Tensor
  self, other: "_pow_backward_all(grad, self, other, keyset)"

- name: maximum(Tensor self, Tensor other) -> Tensor
  self, other: "_maximum_backward_all(grad, self, other, keyset)"

- name: minimum(Tensor self, Tensor other) -> Tensor
  self, other: "_minimum_backward_all(grad, self, other, keyset)"

- name: dot(Tensor self, Tensor other) -> Tensor
  self: redispatch("mul", keyset, grad, other)
  other: redispatch("mul", keyset, grad, self)

- name: outer(Tensor self, Tensor other) -> Tensor
  self: redispatch("matmul", keyset, grad, other)
  other: "redispatch(\"matmul\", keyset, redispatch(\"transpose\", keyset, grad, 0, 1), self)"

- name: mv(Tensor self, Tensor other) -> Tensor
  self: redispatch("outer", keyset, grad, other)
  other: "redispatch(\"matmul\", keyset, redispatch(\"transpose\", keyset, self, 0, 1), grad)"

- name: fmin(Tensor self, Tensor other) -> Tensor
  self, other: "_fmin_backward_all(grad, self, other, keyset)"

- name: fmax(Tensor self, Tensor other) -> Tensor
  self, other: "_fmax_backward_all(grad, self, other, keyset)"

- name: fmod(Tensor self, Tensor other) -> Tensor
  self: reduce_grad(grad, self.shape)
  other: "reduce_grad(redispatch(\"neg\", keyset, redispatch(\"mul\", keyset, grad, redispatch(\"trunc\", keyset, redispatch(\"div\", keyset, self, other)))), other.shape)"

- name: hypot(Tensor self, Tensor other) -> Tensor
  self, other: "_hypot_backward_all(grad, self, other, keyset)"

- name: remainder(Tensor self, Tensor other) -> Tensor
  self: reduce_grad(grad, self.shape)
  other: "reduce_grad(redispatch(\"neg\", keyset, redispatch(\"mul\", keyset, grad, redispatch(\"floor\", keyset, redispatch(\"div\", keyset, self, other)))), other.shape)"

- name: logaddexp(Tensor self, Tensor other) -> Tensor
  self, other: "_logaddexp_backward_all(grad, self, other, keyset)"

- name: logaddexp2(Tensor self, Tensor other) -> Tensor
  self, other: "_logaddexp2_backward_all(grad, self, other, keyset)"

- name: floor_divide(Tensor self, Tensor other) -> Tensor
  self: "redispatch(\"mul\", keyset, grad, _scalar_tensor_like(self, 0.0))"
  other: "redispatch(\"mul\", keyset, grad, _scalar_tensor_like(other, 0.0))"

- name: atan2(Tensor self, Tensor other) -> Tensor
  self, other: "_atan2_backward_all(grad, self, other, keyset)"

- name: inner(Tensor self, Tensor other) -> Tensor
  self, other: "_inner_backward_all(grad, self, other, keyset)"

- name: heaviside(Tensor self, Tensor other) -> Tensor
  self: "redispatch(\"mul\", keyset, grad, _scalar_tensor_like(self, 0.0))"
  other: "redispatch(\"mul\", keyset, grad, _scalar_tensor_like(other, 0.0))"

